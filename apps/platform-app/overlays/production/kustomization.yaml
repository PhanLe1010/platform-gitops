apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: platform-app

resources:
  - ../../base

images:
  - name: phanle1010/platform-app
    newTag: latest

patches:
  - path: configmap-patch.yaml
    target:
      kind: ConfigMap
      name: platform-app-config
  - path: replicas-patch.yaml
    target:
      kind: Deployment
      name: platform-app

commonLabels:
  environment: production